[globals]
DEBUG = 0
ENCODING = UTF-8
PREFIX = DICT.
UI = ../template/
; AUTOLOAD = ../src/
LOCALES = ../dict/
TEMP = ../var/temp/
LOGS = ../var/log/
UPLOADS = ../var/upload/
FALLBACK = en
ONERROR = 
CACHE = FALSE
PACKAGE =

[CONF.mail]
enable = 0
host = localhost
port = 25
user =
pass =
scheme =
defaultsender.email = noreply@localhost
defaultsender.name =
mime = text/html

[CONF.database]
enable = 0
type = mysql
user = root
pass =
data =
host = localhost
port = 3306

[CONF.cookie]
options.lifetime = 31536000
options.path = /
options.domain = 
options.secure = false
options.httponly = true
options.samesite = Strict

[CONF.cookie.session]
options.lifetime = 
options.path = 
options.domain = 
options.secure = 
options.httponly = 
options.samesite = 

[CONF.session]
; cache | sql | mongo | jig
engine = 
table = 'sessions'
key = 'CSRF'

[CONF.jwt]
options.lifetime = 60
options.secret = 'öjhefwn/&()/&HIJFIOENFIOEN()*Zuio)(*'

[CONF.header]
alloworigin =
contenttype = application/json
allowheader = Content-Type,Authorization

[CONF.security]
csrf.enable = 0
csrf.methods = POST,PUT
xss.enable = 0
xss.exclude = password,password_verify

[CONF.services]
frontend.url =

[routes]
[redirects]
[maps]
